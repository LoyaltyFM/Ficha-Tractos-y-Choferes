<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loyalty Fleet Management</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Barlow:wght@600;700;800&display=swap');
  :root{
    --navy:#1A2744;--navy2:#243057;--border:#2E3D6A;--border2:#3A4D80;
    --accent:#C8A96E;--accent2:#B8955A;--text:#EDF0F7;--muted:#7B8BAD;
    --green:#4CAF82;--yellow:#E8A030;--red:#D94F4F;--blue:#4A90D9;
    --bg:#111827;--surface:#1A2744;--surface2:#243057;--radius:10px;
    --fd:'Barlow',sans-serif;--fb:'Inter',sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:var(--fb);min-height:100vh;font-size:14px;}

  /* LOGIN */
  #login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px;background:radial-gradient(ellipse at 25% 30%,#243057 0%,#111827 65%);}
  .login-card{background:var(--surface);border:1px solid var(--border2);border-radius:18px;padding:44px 40px;width:100%;max-width:400px;text-align:center;box-shadow:0 24px 80px rgba(0,0,0,.5);}
  .logo-wrap{background:#fff;border-radius:12px;padding:14px 20px;display:inline-block;margin-bottom:24px;}
  .logo-wrap img{width:180px;display:block;}
  .topbar-logo-wrap{background:#fff;border-radius:7px;padding:4px 10px;display:flex;align-items:center;}
  .topbar-logo-wrap img{height:28px;display:block;}
  .login-sub{color:var(--muted);font-size:13px;margin-bottom:28px;}
  .pin-label{font-size:11px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:12px;text-align:left;}
  .pin-dots{display:flex;gap:14px;justify-content:center;margin-bottom:24px;}
  .pin-dot{width:14px;height:14px;border-radius:50%;border:2px solid var(--border2);background:transparent;transition:all .2s;}
  .pin-dot.filled{background:var(--accent);border-color:var(--accent);box-shadow:0 0 10px rgba(200,169,110,.4);}
  .numpad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px;}
  .num-btn{background:var(--surface2);border:1px solid var(--border2);border-radius:var(--radius);color:var(--text);font-family:var(--fb);font-size:20px;font-weight:500;padding:16px;cursor:pointer;transition:all .15s;}
  .num-btn:hover{background:var(--border2);border-color:var(--accent);}
  .num-btn:active{transform:scale(.95);}
  .num-btn.del{font-size:14px;color:var(--muted);}
  .login-error{color:var(--red);font-size:12px;min-height:18px;margin-top:6px;}

  /* APP */
  #app{display:none;flex-direction:column;min-height:100vh;}
  #app.active{display:flex;}
  .topbar{background:var(--navy);border-bottom:1px solid var(--border2);padding:0 24px;height:58px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(0,0,0,.3);}
  .topbar-right{display:flex;align-items:center;gap:12px;}
  .role-pill{font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;padding:4px 12px;border-radius:20px;}
  .role-pill.admin{background:rgba(200,169,110,.15);color:var(--accent);border:1px solid rgba(200,169,110,.35);}
  .role-pill.viewer{background:rgba(74,144,217,.15);color:var(--blue);border:1px solid rgba(74,144,217,.35);}
  .btn-logout{background:none;border:1px solid var(--border2);color:var(--muted);padding:5px 14px;border-radius:7px;cursor:pointer;font-size:12px;font-family:var(--fb);transition:all .2s;}
  .btn-logout:hover{border-color:var(--red);color:var(--red);}
  .tabs{background:var(--navy);border-bottom:1px solid var(--border2);padding:0 24px;display:flex;overflow-x:auto;}
  .tab-btn{background:none;border:none;border-bottom:2px solid transparent;color:var(--muted);font-family:var(--fb);font-size:13px;font-weight:500;padding:12px 18px;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:6px;white-space:nowrap;}
  .tab-btn:hover{color:var(--text);}
  .tab-btn.active{color:var(--accent);border-bottom-color:var(--accent);font-weight:600;}
  .tab-count{background:var(--surface2);border-radius:10px;padding:1px 8px;font-size:10px;font-weight:700;}
  .content{flex:1;padding:24px;max-width:1200px;width:100%;margin:0 auto;}
  .section{display:none;}.section.active{display:block;}

  /* DASHBOARD */
  .stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:14px;margin-bottom:28px;}
  .stat-card{background:var(--surface);border:1px solid var(--border2);border-radius:var(--radius);padding:20px;}
  .stat-label{font-size:11px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:8px;}
  .stat-value{font-family:var(--fd);font-size:34px;font-weight:800;line-height:1;}
  .stat-value.red{color:var(--red);}.stat-value.yellow{color:var(--yellow);}.stat-value.green{color:var(--green);}
  .section-title{font-family:var(--fd);font-size:16px;font-weight:800;margin-bottom:14px;display:flex;align-items:center;gap:8px;}
  .alert-item{background:var(--surface);border:1px solid var(--border2);border-left:3px solid var(--red);border-radius:var(--radius);padding:14px 16px;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between;gap:12px;}
  .alert-item.warn{border-left-color:var(--yellow);}.alert-item.ok{border-left-color:var(--green);}
  .alert-info{flex:1;}.alert-title{font-weight:600;font-size:13px;}.alert-sub{font-size:12px;color:var(--muted);margin-top:2px;}
  .badge{font-size:10px;font-weight:700;padding:3px 10px;border-radius:12px;text-transform:uppercase;letter-spacing:.5px;white-space:nowrap;}
  .badge.red{background:rgba(217,79,79,.15);color:var(--red);border:1px solid rgba(217,79,79,.3);}
  .badge.yellow{background:rgba(232,160,48,.15);color:var(--yellow);border:1px solid rgba(232,160,48,.3);}
  .badge.green{background:rgba(76,175,130,.15);color:var(--green);border:1px solid rgba(76,175,130,.3);}

  /* TOOLBAR */
  .toolbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;gap:12px;flex-wrap:wrap;}
  .search-input{background:var(--surface);border:1px solid var(--border2);border-radius:var(--radius);color:var(--text);font-family:var(--fb);font-size:13px;padding:8px 14px;width:240px;outline:none;transition:border-color .2s;}
  .search-input:focus{border-color:var(--accent);}.search-input::placeholder{color:var(--muted);}
  .btn{border:none;border-radius:var(--radius);cursor:pointer;font-family:var(--fb);font-size:13px;font-weight:600;padding:8px 18px;transition:all .2s;display:inline-flex;align-items:center;gap:6px;}
  .btn-primary{background:var(--accent);color:#1A2744;}.btn-primary:hover{background:var(--accent2);}
  .btn-ghost{background:var(--surface2);border:1px solid var(--border2);color:var(--text);}.btn-ghost:hover{border-color:var(--accent);color:var(--accent);}
  .btn-danger{background:rgba(217,79,79,.12);border:1px solid rgba(217,79,79,.3);color:var(--red);}.btn-danger:hover{background:rgba(217,79,79,.22);}
  .btn-sm{padding:5px 12px;font-size:12px;}

  /* CARDS */
  .card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px;}
  .unit-card{background:var(--surface);border:1px solid var(--border2);border-radius:var(--radius);padding:20px;transition:border-color .2s;}
  .unit-card:hover{border-color:var(--accent);}
  .unit-card-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:14px;}
  .unit-plate{font-family:var(--fd);font-size:20px;font-weight:800;color:var(--accent);letter-spacing:1.5px;}
  .unit-type-badge{font-size:10px;font-weight:700;padding:3px 10px;border-radius:12px;background:rgba(200,169,110,.1);color:var(--accent);border:1px solid rgba(200,169,110,.25);text-transform:uppercase;}
  .unit-info-row{display:flex;justify-content:space-between;font-size:12px;margin-bottom:5px;}
  .unit-info-label{color:var(--muted);}.unit-info-value{font-weight:500;text-align:right;max-width:60%;word-break:break-all;}
  .unit-card-footer{margin-top:14px;padding-top:14px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end;}

  /* MODALS */
  .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:1000;align-items:center;justify-content:center;padding:20px;}
  .modal-overlay.open{display:flex;}
  .modal{background:var(--surface);border:1px solid var(--border2);border-radius:14px;width:100%;max-width:560px;max-height:90vh;overflow-y:auto;}
  .modal.wide{max-width:720px;}
  .modal-header{display:flex;align-items:center;justify-content:space-between;padding:20px 24px;border-bottom:1px solid var(--border2);position:sticky;top:0;background:var(--surface);z-index:1;}
  .modal-title{font-family:var(--fd);font-size:18px;font-weight:800;}
  .modal-close{background:none;border:none;color:var(--muted);cursor:pointer;font-size:20px;padding:4px;transition:color .2s;}.modal-close:hover{color:var(--text);}
  .modal-body{padding:24px;}
  .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
  .form-group{display:flex;flex-direction:column;gap:6px;}.form-group.full{grid-column:1/-1;}
  .form-label{font-size:11px;font-weight:600;letter-spacing:.8px;text-transform:uppercase;color:var(--muted);}
  .form-input,.form-select{background:var(--surface2);border:1px solid var(--border2);border-radius:8px;color:var(--text);font-family:var(--fb);font-size:13px;padding:9px 12px;outline:none;transition:border-color .2s;width:100%;}
  .form-input:focus,.form-select:focus{border-color:var(--accent);}.form-select option{background:var(--surface2);}
  .modal-footer{display:flex;gap:10px;justify-content:flex-end;padding:16px 24px;border-top:1px solid var(--border2);}
  .divider-label{font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--accent);margin:20px 0 12px;padding-bottom:8px;border-bottom:1px solid var(--border2);}

  /* DOCS TABLE */
  .docs-table{width:100%;border-collapse:collapse;}
  .docs-table th{font-size:11px;font-weight:600;letter-spacing:.8px;text-transform:uppercase;color:var(--muted);text-align:left;padding:10px 14px;border-bottom:1px solid var(--border2);}
  .docs-table td{padding:12px 14px;border-bottom:1px solid var(--border);font-size:13px;vertical-align:middle;}
  .docs-table tr:last-child td{border-bottom:none;}.docs-table tr:hover td{background:rgba(255,255,255,.02);}
  .semaphore{width:10px;height:10px;border-radius:50%;display:inline-block;margin-right:6px;}
  .semaphore.green{background:var(--green);box-shadow:0 0 6px rgba(76,175,130,.5);}
  .semaphore.yellow{background:var(--yellow);box-shadow:0 0 6px rgba(232,160,48,.5);}
  .semaphore.red{background:var(--red);box-shadow:0 0 6px rgba(217,79,79,.5);}

  /* CONDUCTOR CARDS */
  .conductor-card{background:var(--surface);border:1px solid var(--border2);border-radius:var(--radius);padding:20px;transition:border-color .2s;}
  .conductor-card:hover{border-color:var(--accent);}
  .conductor-name{font-family:var(--fd);font-size:16px;font-weight:800;margin-bottom:4px;}
  .conductor-unit{font-size:12px;color:var(--muted);margin-bottom:12px;}
  .conductor-unit span{color:var(--accent);font-weight:600;}

  .empty-state{text-align:center;padding:60px 20px;color:var(--muted);}
  .empty-icon{font-size:48px;margin-bottom:12px;}.empty-title{font-size:16px;font-weight:600;color:var(--text);margin-bottom:6px;}
  .toast{position:fixed;bottom:24px;right:24px;background:var(--surface2);border:1px solid var(--border2);border-radius:10px;padding:12px 20px;font-size:13px;font-weight:500;z-index:9999;transform:translateY(80px);opacity:0;transition:all .3s;}
  .toast.show{transform:translateY(0);opacity:1;}.toast.error{border-color:rgba(217,79,79,.4);}
  @media(max-width:600px){.form-grid{grid-template-columns:1fr;}.card-grid{grid-template-columns:1fr;}.content{padding:16px;}.search-input{width:100%;}}
</style>
</head>

// ── PIN ─────────────────────────────────────────────────
function addPin(d) { if (pinBuffer.length >= 4) return; pinBuffer += d; updateDots(); if (pinBuffer.length === 4) setTimeout(checkPin, 150); }
function delPin() { pinBuffer = pinBuffer.slice(0,-1); updateDots(); }
function clearPin() { pinBuffer=''; updateDots(); document.getElementById('login-error').textContent=''; }
function updateDots() { for (let i=0;i<4;i++) document.getElementById('dot'+i).classList.toggle('filled', i < pinBuffer.length); }
function checkPin() {
  if (pinBuffer === PIN_ADMIN) { currentRole='admin'; enterApp(); }
  else if (pinBuffer === PIN_VIEWER) { currentRole='viewer'; enterApp(); }
  else { document.getElementById('login-error').textContent='PIN incorrecto'; pinBuffer=''; updateDots(); }
}
function enterApp() {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').classList.add('active');
  const pill = document.getElementById('role-pill');
  pill.textContent = currentRole==='admin' ? 'ADMIN' : 'VISUALIZACIÓN';
  pill.className = 'role-pill ' + currentRole;
  ['btn-add-unidad','btn-add-doc','btn-add-conductor'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.style.display = currentRole==='admin' ? '' : 'none';
  });
  loadAll();
}
function logout() { currentRole=null; pinBuffer=''; updateDots(); document.getElementById('login-error').textContent=''; document.getElementById('app').classList.remove('active'); document.getElementById('login-screen').style.display='flex'; }

// ── TABS ────────────────────────────────────────────────
function switchTab(tab) {
  const tabs=['dashboard','unidades','documentos','conductores'];
  document.querySelectorAll('.tab-btn').forEach((b,i) => b.classList.toggle('active', tabs[i]===tab));
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.getElementById('section-'+tab).classList.add('active');
}

async function seedIfEmpty() {
  const {data: ex} = await db.from('lfm_unidades').select('id').limit(1);
  if (ex && ex.length > 0) return;
  showToast('Cargando flota inicial…');
  for (const u of SEED_UNITS) {
    await db.from('lfm_unidades').insert({
      placa: u.placa || null, economico: u.economico, tipo: u.tipo,
      marca: u.marca, anio: u.anio || null, vin: u.vin || null,
      aseguradora: u.aseguradora || null,
      num_poliza: u.num_poliza || null,
      notas: u.notas || null
    });
  }
  for (const c of SEED_CONDUCTORES) {
    await db.from('lfm_conductores').insert({
      nombre: c.nombre, empresa: c.empresa, estado: c.estado, notas: c.notas || null
    });
  }
  showToast('✅ Flota cargada — 8 tractos, 9 remolques, 10 conductores');
  await loadAll();
}

// ── UNIDADES ────────────────────────────────────────────
let unidades = [];
async function loadUnidades() {
  const {data} = await db.from('lfm_unidades').select('*').order('tipo').order('economico');
  unidades = data || [];
  document.getElementById('count-unidades').textContent = unidades.length;
  renderUnidades(); populateUnitSelects();
}
function renderUnidades(search='') {
  const grid = document.getElementById('unidades-grid');
  const q = search.toLowerCase();
  const f = unidades.filter(u => !q || u.placa?.toLowerCase().includes(q) || u.economico?.toLowerCase().includes(q) || u.vin?.toLowerCase().includes(q) || u.marca?.toLowerCase().includes(q));
  if (!f.length) { grid.innerHTML='<div class="empty-state" style="grid-column:1/-1"><div class="empty-icon">🚛</div><div class="empty-title">Sin unidades</div></div>'; return; }
  grid.innerHTML = f.map(u => `
    <div class="unit-card">
      <div class="unit-card-header">
        <div>
          <div class="unit-plate">${u.placa || u.economico || '—'}</div>
          <div style="font-size:11px;color:var(--muted);margin-top:2px">${u.economico || ''}</div>
        </div>
        <span class="unit-type-badge">${u.tipo||''}</span>
      </div>
      <div class="unit-info-row"><span class="unit-info-label">Marca / Año</span><span class="unit-info-value">${u.marca||'—'} ${u.anio||''}</span></div>
      <div class="unit-info-row"><span class="unit-info-label">NIV / VIN</span><span class="unit-info-value">${u.vin||'—'}</span></div>
      <div class="unit-info-row"><span class="unit-info-label">Aseguradora</span><span class="unit-info-value">${u.aseguradora||'—'}</span></div>
      <div class="unit-info-row"><span class="unit-info-label">No. Póliza</span><span class="unit-info-value">${u.num_poliza||'—'}</span></div>
      ${u.notas ? `<div style="font-size:11px;color:var(--muted);margin-top:6px;padding-top:6px;border-top:1px solid var(--border)">${u.notas}</div>` : ''}
      ${currentRole==='admin' ? `<div class="unit-card-footer"><button class="btn btn-ghost btn-sm" onclick="openUnitModal('${u.id}')">✏️ Editar</button><button class="btn btn-danger btn-sm" onclick="deleteUnidad('${u.id}')">🗑️</button></div>` : ''}
    </div>`).join('');
}
function populateUnitSelects() {
  const o = '<option value="">Sin asignación</option>' + unidades.map(u => `<option value="${u.id}">${u.economico||u.placa} — ${u.tipo}</option>`).join('');
  document.getElementById('c-unidad').innerHTML = o;
  document.getElementById('d-unidad').innerHTML = '<option value="">Seleccionar…</option>' + unidades.map(u => `<option value="${u.id}">${u.economico||u.placa} — ${u.tipo}</option>`).join('');
}
function openUnitModal(id=null) {
  if (currentRole!=='admin') return; editingUnitId=id;
  document.getElementById('mu-title').textContent = id ? 'Editar unidad' : 'Nueva unidad';
  ['u-placa','u-economico','u-tipo','u-marca','u-anio','u-vin','u-aseguradora','u-poliza','u-notas'].forEach(f => { const el=document.getElementById(f); if(el) el.value=''; });
  if (id) {
    const u = unidades.find(x=>x.id===id);
    if (u) {
      document.getElementById('u-placa').value=u.placa||'';
      document.getElementById('u-economico').value=u.economico||'';
      document.getElementById('u-tipo').value=u.tipo||'';
      document.getElementById('u-marca').value=u.marca||'';
      document.getElementById('u-anio').value=u.anio||'';
      document.getElementById('u-vin').value=u.vin||'';
      document.getElementById('u-aseguradora').value=u.aseguradora||'';
      document.getElementById('u-poliza').value=u.num_poliza||'';
      document.getElementById('u-notas').value=u.notas||'';
    }
  }
  document.getElementById('modal-unidad').classList.add('open');
}
async function saveUnidad() {
  const data = {
    placa: document.getElementById('u-placa').value.trim().toUpperCase()||null,
    economico: document.getElementById('u-economico').value.trim(),
    tipo: document.getElementById('u-tipo').value,
    marca: document.getElementById('u-marca').value.trim(),
    anio: document.getElementById('u-anio').value||null,
    vin: document.getElementById('u-vin').value.trim(),
    aseguradora: document.getElementById('u-aseguradora').value.trim(),
    num_poliza: document.getElementById('u-poliza').value.trim(),
    notas: document.getElementById('u-notas').value.trim()
  };
  if (!data.tipo) { showToast('Tipo es obligatorio','error'); return; }
  if (editingUnitId) { await db.from('lfm_unidades').update(data).eq('id',editingUnitId); showToast('✅ Actualizado'); }
  else { await db.from('lfm_unidades').insert(data); showToast('✅ Registrado'); }
  closeModal('modal-unidad'); await loadUnidades(); renderDashboard();
}
async function deleteUnidad(id) {
  if (!confirm('¿Eliminar esta unidad?')) return;
  await db.from('lfm_documentos').delete().eq('unidad_id',id);
  await db.from('lfm_unidades').delete().eq('id',id);
  showToast('🗑️ Eliminado'); await loadAll();
}

// ── DOCUMENTOS ──────────────────────────────────────────
let documentos = [];
async function loadDocumentos() {
  const {data} = await db.from('lfm_documentos').select('*').order('vencimiento',{ascending:true});
  documentos = data||[]; document.getElementById('count-docs').textContent=documentos.length; renderDocumentos();
}
function dr(f) { if(!f) return null; const h=new Date(); h.setHours(0,0,0,0); return Math.floor((new Date(f)-h)/864e5); }
function sc(d) { if(d===null) return'green'; if(d<0) return'red'; if(d<=60) return'yellow'; return'green'; }
function sl(d) { if(d===null) return'Sin fecha'; if(d<0) return`Vencido ${Math.abs(d)}d`; if(d===0) return'Hoy'; return`${d}d`; }
function renderDocumentos(search='') {
  const c = document.getElementById('documentos-container');
  const um = {}; unidades.forEach(u=>{um[u.id]=u;});
  const groups = {}; documentos.forEach(d=>{const uid=d.unidad_id||'X'; if(!groups[uid]) groups[uid]=[]; groups[uid].push(d);});
  if (!documentos.length) { c.innerHTML='<div class="empty-state"><div class="empty-icon">📋</div><div class="empty-title">Sin documentos registrados</div><div class="empty-sub">Agrega los documentos de cada unidad</div></div>'; return; }
  let html='';
  Object.entries(groups).forEach(([uid,docs])=>{
    const u=um[uid]; const label=u?(u.economico||u.placa):'Sin unidad'; const tipo=u?u.tipo:'';
    const filt=search?docs.filter(d=>label.toLowerCase().includes(search.toLowerCase())||d.tipo?.toLowerCase().includes(search.toLowerCase())):docs;
    if(!filt.length) return;
    html+=`<div style="margin-bottom:28px">
      <div class="section-title" style="font-size:14px">🚛 ${label} <span style="color:var(--muted);font-size:12px;font-weight:400">${tipo} ${u?.placa?'· '+u.placa:''}</span></div>
      <div style="background:var(--surface);border:1px solid var(--border2);border-radius:var(--radius);overflow:hidden">
      <table class="docs-table"><thead><tr><th>Estado</th><th>Documento</th><th>Folio</th><th>Vencimiento</th><th>Proveedor</th>${currentRole==='admin'?'<th></th>':''}</tr></thead><tbody>
      ${filt.map(d=>{const dias=dr(d.vencimiento);const s=sc(dias);return`<tr>
        <td><span class="semaphore ${s}"></span><span class="badge ${s}">${sl(dias)}</span></td>
        <td style="font-weight:500">${d.tipo||'—'}</td>
        <td style="color:var(--muted);font-size:12px">${d.numero||'—'}</td>
        <td>${d.vencimiento?new Date(d.vencimiento+'T00:00:00').toLocaleDateString('es-MX',{day:'2-digit',month:'short',year:'numeric'}):'—'}</td>
        <td style="color:var(--muted)">${d.proveedor||'—'}</td>
        ${currentRole==='admin'?`<td style="text-align:right;white-space:nowrap"><button class="btn btn-ghost btn-sm" onclick="openDocModal('${d.id}')">✏️</button> <button class="btn btn-danger btn-sm" onclick="deleteDoc('${d.id}')">🗑️</button></td>`:''}
      </tr>`;  }).join('')}
      </tbody></table></div></div>`;
  });
  c.innerHTML = html || '<div class="empty-state"><div class="empty-icon">🔍</div><div class="empty-title">Sin resultados</div></div>';
}
function openDocModal(id=null) {
  if(currentRole!=='admin') return; editingDocId=id;
  document.getElementById('md-title').textContent = id?'Editar documento':'Nuevo documento';
  ['d-unidad','d-tipo','d-numero','d-emision','d-vencimiento','d-proveedor','d-notas'].forEach(f=>{const el=document.getElementById(f);if(el)el.value=''});
  if(id){const d=documentos.find(x=>x.id===id);if(d){document.getElementById('d-unidad').value=d.unidad_id||'';document.getElementById('d-tipo').value=d.tipo||'';document.getElementById('d-numero').value=d.numero||'';document.getElementById('d-emision').value=d.emision||'';document.getElementById('d-vencimiento').value=d.vencimiento||'';document.getElementById('d-proveedor').value=d.proveedor||'';document.getElementById('d-notas').value=d.notas||'';}}
  document.getElementById('modal-doc').classList.add('open');
}
async function saveDoc() {
  const data={unidad_id:document.getElementById('d-unidad').value||null,tipo:document.getElementById('d-tipo').value,numero:document.getElementById('d-numero').value.trim(),emision:document.getElementById('d-emision').value||null,vencimiento:document.getElementById('d-vencimiento').value||null,proveedor:document.getElementById('d-proveedor').value.trim(),notas:document.getElementById('d-notas').value.trim()};
  if(!data.tipo||!data.vencimiento){showToast('Tipo y vencimiento requeridos','error');return;}
  if(editingDocId){await db.from('lfm_documentos').update(data).eq('id',editingDocId);showToast('✅ Actualizado');}
  else{await db.from('lfm_documentos').insert(data);showToast('✅ Registrado');}
  closeModal('modal-doc');await loadDocumentos();renderDashboard();
}
async function deleteDoc(id){if(!confirm('¿Eliminar?'))return;await db.from('lfm_documentos').delete().eq('id',id);showToast('🗑️ Eliminado');await loadDocumentos();renderDashboard();}

let conductores = [];

  const {data} = await db.from('lfm_conductores').select('*').order('nombre');

}
function renderConductores(search='') {
  const grid = document.getElementById('conductores-grid');

    const u=c.unidad_id?um[c.unidad_id]:null;
    const licS=sc(dr(c.licencia_vencimiento)); const mediS=sc(dr(c.medico_vencimiento));
    const eColor=c.estado==='Activo'?'green':c.estado==='Inactivo'?'red':'yellow';
    return `<div class="conductor-card">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:4px">
        <div class="conductor-name">${c.nombre||'—'}</div>
        <span class="badge ${eColor}">${c.estado||'Activo'}</span>
      </div>
      <div class="conductor-unit">

      ${c.notas?`<div style="font-size:11px;color:var(--muted);margin-bottom:10px">${c.notas}</div>`:''}
      <div style="margin-top:10px;padding-top:10px;border-top:1px solid var(--border)">
        <div class="unit-info-row"><span class="unit-info-label">Licencia federal</span><span><span class="semaphore ${licS}"></span><span class="badge ${licS}" style="font-size:9px">${sl(dr(c.licencia_vencimiento))}</span></span></div>
        <div class="unit-info-row" style="margin-top:4px"><span class="unit-info-label">Examen médico</span><span><span class="semaphore ${mediS}"></span><span class="badge ${mediS}" style="font-size:9px">${sl(dr(c.medico_vencimiento))}</span></span></div>
      </div>
      ${currentRole==='admin'?`<div class="unit-card-footer"><button class="btn btn-ghost btn-sm" onclick="openConductorModal('${c.id}')">✏️ Editar</button><button class="btn btn-danger btn-sm" onclick="deleteConductor('${c.id}')">🗑️</button></div>`:''}
    </div>`;
  }).join('');
}

}
async function saveConductor() {
  const data={nombre:document.getElementById('c-nombre').value.trim(),curp:document.getElementById('c-curp').value.trim().toUpperCase(),rfc:document.getElementById('c-rfc').value.trim().toUpperCase(),telefono:document.getElementById('c-tel').value.trim(),empresa:document.getElementById('c-empresa').value.trim(),unidad_id:document.getElementById('c-unidad').value||null,estado:document.getElementById('c-estado').value,licencia_numero:document.getElementById('c-lic-num').value.trim(),licencia_tipo:document.getElementById('c-lic-tipo').value,licencia_emision:document.getElementById('c-lic-emision').value||null,licencia_vencimiento:document.getElementById('c-lic-vto').value||null,medico_vencimiento:document.getElementById('c-medico').value||null,psico_vencimiento:document.getElementById('c-psico').value||null,notas:document.getElementById('c-notas').value.trim()};
  if(!data.nombre){showToast('Nombre requerido','error');return;}
  if(editingConductorId){await db.from('lfm_conductores').update(data).eq('id',editingConductorId);showToast('✅ Actualizado');}
  else{await db.from('lfm_conductores').insert(data);showToast('✅ Registrado');}
  closeModal('modal-conductor');await loadConductores();renderDashboard();
}
async function deleteConductor(id){if(!confirm('¿Eliminar?'))return;await db.from('lfm_conductores').delete().eq('id',id);showToast('🗑️ Eliminado');await loadConductores();renderDashboard();}

// ── DASHBOARD ───────────────────────────────────────────
function renderDashboard() {
  const vencidos=documentos.filter(d=>dr(d.vencimiento)<0).length;
  const porVencer=documentos.filter(d=>{const x=dr(d.vencimiento);return x!==null&&x>=0&&x<=60;}).length;
  const licAlerta=conductores.filter(c=>{const x=dr(c.licencia_vencimiento);return x!==null&&x<=60;}).length;
  document.getElementById('stats-grid').innerHTML=`
    <div class="stat-card"><div class="stat-label">Tractos</div><div class="stat-value">${unidades.filter(u=>u.tipo==='Tracto').length}</div></div>
    <div class="stat-card"><div class="stat-label">Remolques</div><div class="stat-value">${unidades.filter(u=>u.tipo==='Remolque').length}</div></div>
    <div class="stat-card"><div class="stat-label">Conductores</div><div class="stat-value">${conductores.length}</div></div>
    <div class="stat-card"><div class="stat-label">Docs vencidos</div><div class="stat-value ${vencidos>0?'red':'green'}">${vencidos}</div></div>
    <div class="stat-card"><div class="stat-label">Por vencer 60d</div><div class="stat-value ${porVencer>0?'yellow':'green'}">${porVencer}</div></div>
    <div class="stat-card"><div class="stat-label">Licencias alerta</div><div class="stat-value ${licAlerta>0?'red':'green'}">${licAlerta}</div></div>`;
  const um={};unidades.forEach(u=>{um[u.id]=u;});
  const alerts=[];
  documentos.forEach(d=>{const dias=dr(d.vencimiento);if(dias===null||dias>60)return;const u=d.unidad_id?um[d.unidad_id]:null;alerts.push({titulo:d.tipo,sub:u?(u.economico||u.placa):'Sin unidad',dias});});
  conductores.forEach(c=>{
    const licD=dr(c.licencia_vencimiento); if(licD!==null&&licD<=60) alerts.push({titulo:`Licencia — ${c.nombre}`,sub:'Conductor',dias:licD});
    const medD=dr(c.medico_vencimiento); if(medD!==null&&medD<=60) alerts.push({titulo:`Médico — ${c.nombre}`,sub:'Conductor',dias:medD});
  });
  alerts.sort((a,b)=>a.dias-b.dias);
  const al=document.getElementById('alerts-list');
  if(!alerts.length){al.innerHTML='<div class="alert-item ok"><div class="alert-info"><div class="alert-title">✅ Todo en orden</div><div class="alert-sub">Sin documentos por vencer en los próximos 60 días</div></div></div>';return;}
  al.innerHTML=alerts.map(a=>{const s=sc(a.dias);return`<div class="alert-item ${s==='red'?'':'warn'}"><div class="alert-info"><div class="alert-title">${a.titulo}</div><div class="alert-sub">${a.sub}</div></div><span class="badge ${s}">${sl(a.dias)}</span></div>`;}).join('');
}

// ── UTILS ───────────────────────────────────────────────
function closeModal(id){document.getElementById(id).classList.remove('open');}
function showToast(msg,type='success'){const t=document.getElementById('toast');t.textContent=msg;t.className='toast '+type+' show';setTimeout(()=>t.classList.remove('show'),3500);}
document.querySelectorAll('.modal-overlay').forEach(o=>o.addEventListener('click',e=>{if(e.target===o)o.classList.remove('open');}));
</script>
